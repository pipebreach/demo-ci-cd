name: "CI - Python Quality and Tests"

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read
  checks: write

jobs:
  lint:
    name: "Lint & Format"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - name: Ruff check
        run: ruff check src/ tests/ --output-format=github
      - name: Ruff format check
        run: ruff format --check src/ tests/

  security:
    name: "Bandit Scan"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - name: Bandit scan
        run: bandit -r src/ -f json -o bandit-report.json || true
      - name: Check critical findings
        run: |
          CRITICAL=$(python -c "
          import json
          with open('bandit-report.json') as f:
              data = json.load(f)
          critical = [r for r in data.get('results', []) if r['issue_severity'] == 'HIGH']
          print(len(critical))
          ")
          if [ "$CRITICAL" -gt 0 ]; then
            echo "::error::Found $CRITICAL high-severity security issues"
            exit 1
          fi

  test-bdd:
    name: "Pytest"
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
          cache: pip
      - run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Run pytest-bdd
        run: |
          FEATURE_COUNT=$(find tests/features -name "*.feature" 2>/dev/null | wc -l)
          STEPDEF_COUNT=$(find tests/step_defs -name "test_*.py" 2>/dev/null | wc -l)

          if [ "$FEATURE_COUNT" -eq 0 ] || [ "$STEPDEF_COUNT" -eq 0 ]; then
            echo "::notice::BDD skipped — features: ${FEATURE_COUNT}, step_defs: ${STEPDEF_COUNT}."
            exit 0
          fi

          pytest tests/ \
            -v \
            --tb=short \
            --junitxml=test-results.xml \
            --strict-markers \
            --ignore=tests/functional
      - name: Publish test results
        uses: dorny/test-reporter@3eeb9fc888e82e8be2fb356bbeec2750231672bc # v1
        if: always() && hashFiles('test-results.xml') != ''
        continue-on-error: true
        with:
          name: "BDD Test Results"
          path: test-results.xml
          reporter: java-junit
          fail-on-error: "false"

  gate:
    name: "Merge Gate"
    runs-on: ubuntu-latest
    needs: [lint, security, test-bdd]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.security.result }}" != "success" ] || \
             [ "${{ needs.test-bdd.result }}" != "success" ]; then
            echo "::error::One or more required checks failed."
            exit 1
          fi
          echo "All checks passed."
