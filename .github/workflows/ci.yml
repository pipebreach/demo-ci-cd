name: CI - Contratos Ejecutables

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write
  pull-requests: read

jobs:
  scope-check:
    name: "Scope Check"
    if: >
      github.event_name == 'pull_request' &&
      startsWith(github.event.pull_request.title, '[IMPL]')
    runs-on: ubuntu-latest
    steps:
      - name: Verificar archivos modificados
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MODIFIED=$(gh pr diff "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --name-only)

          VIOLATIONS=""

          if echo "$MODIFIED" | grep -q '\.feature$'; then
            VIOLATIONS="${VIOLATIONS}- .feature (contratos aprobados)\n"
          fi
          if echo "$MODIFIED" | grep -q '\.github/workflows/'; then
            VIOLATIONS="${VIOLATIONS}- .github/workflows/ (CI/CD)\n"
          fi
          if echo "$MODIFIED" | grep -qE 'requirements.*\.txt$'; then
            VIOLATIONS="${VIOLATIONS}- requirements*.txt (dependencias)\n"
          fi
          if echo "$MODIFIED" | grep -q 'CODEOWNERS'; then
            VIOLATIONS="${VIOLATIONS}- CODEOWNERS\n"
          fi

          if [ -n "$VIOLATIONS" ]; then
            echo "::error::Archivos fuera de alcance modificados:"
            echo -e "$VIOLATIONS"
            exit 1
          fi

  lint:
    name: "Lint & Format"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - name: Ruff check
        run: ruff check src/ tests/ --output-format=github
      - name: Ruff format check
        run: ruff format --check src/ tests/

  security:
    name: "Security Scan"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - name: Bandit scan
        run: bandit -r src/ -f json -o bandit-report.json || true
      - name: Check critical findings
        run: |
          CRITICAL=$(python -c "
          import json
          with open('bandit-report.json') as f:
              data = json.load(f)
          critical = [r for r in data.get('results', []) if r['issue_severity'] == 'HIGH']
          print(len(critical))
          ")
          if [ "$CRITICAL" -gt 0 ]; then
            echo "::error::Found $CRITICAL high-severity security issues"
            exit 1
          fi

  test-bdd:
    name: "Contratos BDD"
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
          cache: pip
      - run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Run pytest-bdd
        run: |
          FEATURE_COUNT=$(find tests/features -name "*.feature" 2>/dev/null | wc -l)
          STEPDEF_COUNT=$(find tests/step_defs -name "test_*.py" 2>/dev/null | wc -l)

          if [ "$FEATURE_COUNT" -eq 0 ] || [ "$STEPDEF_COUNT" -eq 0 ]; then
            echo "::notice::BDD skipped — features: ${FEATURE_COUNT}, step_defs: ${STEPDEF_COUNT}. Pipeline aún en fase de planificación."
            exit 0
          fi

          pytest tests/ \
            -v \
            --tb=short \
            --junitxml=test-results.xml \
            --strict-markers \
            --ignore=tests/functional
      - name: Publish test results
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        if: always() && hashFiles('test-results.xml') != ''
        continue-on-error: true
        with:
          name: "BDD Test Results"
          path: test-results.xml
          reporter: java-junit
          fail-on-error: "false"

  gate:
    name: "Merge Gate"
    runs-on: ubuntu-latest
    needs: [scope-check, lint, security, test-bdd]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          # scope-check is skipped for non-[IMPL] PRs and pushes — that's OK
          if [ "${{ needs.scope-check.result }}" != "success" ] && \
             [ "${{ needs.scope-check.result }}" != "skipped" ]; then
            echo "::error::Scope check failed."
            exit 1
          fi
          if [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.security.result }}" != "success" ] || \
             [ "${{ needs.test-bdd.result }}" != "success" ]; then
            echo "::error::One or more required checks failed."
            exit 1
          fi
          echo "All checks passed."
