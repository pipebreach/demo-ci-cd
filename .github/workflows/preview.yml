name: "Preview - Codespace Environment"

on:
  workflow_call:
    inputs:
      branch:
        description: "Branch to deploy in the preview environment"
        required: false
        type: string
  push:
    branches: [main]
    paths: ["src/**"]
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to deploy (default: main)"
        required: false
        default: "main"
        type: string

permissions:
  contents: read

jobs:
  preview:
    name: "Start Preview API"
    runs-on: ubuntu-latest
    outputs:
      api_url: ${{ steps.url.outputs.url }}

    steps:
      - name: Delete previous Codespaces for the repository
        env:
          GH_TOKEN: ${{ secrets.CODESPACE_PAT }}
        run: |
          echo "Checking for previous Codespaces..."
          EXISTING=$(gh codespace list --repo "${{ github.repository }}" --json name --jq '.[].name')

          if [ -z "$EXISTING" ]; then
            echo "No previous Codespaces found."
          else
            echo "$EXISTING" | while IFS= read -r cs; do
              echo "Deleting: ${cs}"
              gh codespace delete --codespace "$cs" --force || true
            done
            echo "Cleanup completed."
          fi

      - name: Create Codespace
        id: create
        env:
          GH_TOKEN: ${{ secrets.CODESPACE_PAT }}
        run: |
          # In workflow_call or workflow_dispatch use the provided input; in push use main.
          BRANCH="${{ inputs.branch || 'main' }}"

          gh codespace create \
            --repo "${{ github.repository }}" \
            --branch "${BRANCH}" \
            --idle-timeout 30m \
            --retention-period 2h \
            --machine basicLinux32gb

          NAME=$(gh codespace list \
            --repo "${{ github.repository }}" \
            --json name \
            --jq '.[0].name')
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"
          echo "Codespace created: ${NAME}"

      - name: Wait for Codespace readiness
        env:
          GH_TOKEN: ${{ secrets.CODESPACE_PAT }}
          CS_NAME: ${{ steps.create.outputs.name }}
        run: |
          echo "Waiting for state 'Available'..."
          READY=false
          for i in $(seq 1 24); do
            STATE=$(gh codespace list --json name,state \
              | jq -r --arg n "$CS_NAME" '.[] | select(.name==$n) | .state')
            echo "  [${i}/24] state: ${STATE}"
            if [ "$STATE" = "Available" ]; then
              READY=true
              break
            fi
            sleep 15
          done

          if [ "$READY" != "true" ]; then
            echo "::error::Codespace did not reach 'Available' state in 6 minutes (last state: ${STATE})."
            exit 1
          fi

      - name: Wait for FastAPI to expose port 8000
        env:
          GH_TOKEN: ${{ secrets.CODESPACE_PAT }}
          CS_NAME: ${{ steps.create.outputs.name }}
        run: |
          for i in $(seq 1 36); do
            PORTS=$(gh codespace ports -c "$CS_NAME" --json sourcePort \
              --jq '.[].sourcePort' 2>/dev/null || echo "")
            if echo "$PORTS" | grep -q "8000"; then
              echo "  [${i}/36] Port 8000 detected."
              break
            fi
            echo "  [${i}/36] Port 8000 not visible yet."
            sleep 10
          done

      - name: Expose port 8000 publicly
        env:
          GH_TOKEN: ${{ secrets.CODESPACE_PAT }}
          CS_NAME: ${{ steps.create.outputs.name }}
        run: |
          gh codespace ports visibility 8000:public -c "$CS_NAME"

      - name: Obtain preview URL and verify health
        id: url
        env:
          GH_TOKEN: ${{ secrets.CODESPACE_PAT }}
          CS_NAME: ${{ steps.create.outputs.name }}
        run: |
          URL=$(gh codespace ports -c "$CS_NAME" --json sourcePort,browseUrl \
            | jq -r '.[] | select(.sourcePort==8000) | .browseUrl')
          echo "url=${URL}" >> "$GITHUB_OUTPUT"

          echo "Checking that the API responds at ${URL}..."
          API_READY=false
          for i in $(seq 1 24); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${URL}/health" || echo "000")
            echo "  [${i}/24] HTTP ${STATUS}"
            if [ "$STATUS" = "200" ]; then
              echo "API ready."
              API_READY=true
              break
            fi
            sleep 10
          done

          if [ "$API_READY" != "true" ]; then
            echo "::warning::API did not respond after ~4 minutes."
            echo "::warning::Verify that the devcontainer postCreateCommand completed."
            echo "::error::The API did not return HTTP 200 on /health (last HTTP: ${STATUS})."
            exit 1
          fi

      - name: Publish preview summary
        env:
          API_URL: ${{ steps.url.outputs.url }}
          CS_NAME: ${{ steps.create.outputs.name }}
          SHA: ${{ github.sha }}
        run: |
          SHORT_SHA="${SHA:0:7}"
          cat >> "$GITHUB_STEP_SUMMARY" << EOF
          ## Preview Environment Ready

          > Commit \`${SHORT_SHA}\` is available in a temporary Codespace environment.

          | | |
          |---|---|
          | **Base URL** | ${API_URL} |
          | **Health** | ${API_URL}/health |
          | **Swagger UI** | ${API_URL}/docs |
          | **Codespace** | \`${CS_NAME}\` |
          | **Expires** | 30 min idle · max 2 h |
          EOF

  functional-tests:
    name: "Functional Tests"
    needs: preview
    if: needs.preview.outputs.api_url != ''
    uses: ./.github/workflows/functional-tests.yml
    with:
      base_url: ${{ needs.preview.outputs.api_url }}
    secrets: inherit

  dast:
    name: "DAST Scan"
    needs: preview
    if: needs.preview.outputs.api_url != ''
    uses: ./.github/workflows/dast.yml
    with:
      base_url: ${{ needs.preview.outputs.api_url }}
    secrets: inherit
