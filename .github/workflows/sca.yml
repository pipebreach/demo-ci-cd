name: "SCA - Dependency Review and Audit"

on:
  workflow_call:
    inputs:
      dependency_review:
        description: "Run dependency review for pull requests"
        required: false
        default: false
        type: boolean
      pip_audit:
        description: "Run pip-audit checks"
        required: false
        default: false
        type: boolean
  push:
    branches: [main]
    paths:
      - "requirements*.txt"
      - "pyproject.toml"
      - ".github/dependabot.yml"
  schedule:
    - cron: "29 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dependency-review:
    name: "Dependency Review"
    if: inputs.dependency_review
    runs-on: ubuntu-latest
    steps:
      - name: Review dependency changes
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high
          fail-on-scopes: runtime

  pip-audit:
    name: "pip-audit"
    if: inputs.pip_audit || github.event_name != 'workflow_call'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Install pip-audit
        run: python -m pip install --upgrade pip pip-audit

      - name: Audit runtime dependencies
        run: pip-audit -r requirements.txt

      - name: Audit development dependencies
        run: pip-audit -r requirements-dev.txt
