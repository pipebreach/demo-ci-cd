name: "Functional Tests - Post Deploy"

on:
  workflow_call:
    inputs:
      base_url:
        description: "Base URL of the deployed API"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      base_url:
        description: "Base URL of the deployed API"
        required: true
        type: string

permissions:
  contents: read

jobs:
  functional-tests:
    name: "Functional Tests Against Preview"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Resolve deployed API URL
        id: url
        run: |
          URL="${{ inputs.base_url }}"
          echo "url=${URL}" >> "$GITHUB_OUTPUT"
          echo "API URL: ${URL}"

      - name: Smoke test health endpoint
        env:
          API_URL: ${{ steps.url.outputs.url }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${API_URL}/health" || echo "000")
          if [ "$STATUS" != "200" ]; then
            echo "::error::API did not respond on ${API_URL}/health (HTTP ${STATUS})."
            exit 1
          fi
          echo "API reachable (HTTP 200)."

      - name: Check functional test presence
        id: check
        run: |
          FUNC_COUNT=$(find tests/functional -name "test_*.py" 2>/dev/null | wc -l)
          echo "functional_count=$FUNC_COUNT" >> "$GITHUB_OUTPUT"

          if [ "$FUNC_COUNT" -eq 0 ]; then
            echo "::notice::No functional tests found in tests/functional/."
          else
            echo "Found $FUNC_COUNT functional test files."
          fi

      - name: Run functional tests
        if: steps.check.outputs.functional_count != '0'
        env:
          API_URL: ${{ steps.url.outputs.url }}
        run: |
          pytest tests/functional/ \
            -v \
            --tb=short \
            --base-url="${API_URL}" \
            --junitxml=functional-results.xml \
            || PYTEST_EXIT=$?

          echo "pytest_exit=${PYTEST_EXIT:-0}" >> "$GITHUB_ENV"

      - name: Publish results in step summary
        if: always() && steps.check.outputs.functional_count != '0'
        env:
          API_URL: ${{ steps.url.outputs.url }}
        run: |
          if [ -f functional-results.xml ]; then
            TOTAL=$(python -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('functional-results.xml')
          root = tree.getroot()
          ts = root.find('testsuite') or root
          tests = int(ts.get('tests', 0))
          failures = int(ts.get('failures', 0))
          errors = int(ts.get('errors', 0))
          skipped = int(ts.get('skipped', 0))
          passed = tests - failures - errors - skipped
          print(f'{tests}|{passed}|{failures}|{errors}|{skipped}')
          ")

            IFS='|' read -r TESTS PASSED FAILURES ERRORS SKIPPED <<< "$TOTAL"

            if [ "${pytest_exit:-0}" -eq 0 ]; then
              BADGE="✅ All functional tests passed"
            else
              BADGE="❌ Functional test failures detected"
            fi

            cat >> "$GITHUB_STEP_SUMMARY" << EOF
          ## Functional Tests Summary

          ${BADGE}

          | Metric | Value |
          |---|---|
          | **Total** | ${TESTS} |
          | **Passed** | ${PASSED} |
          | **Failed** | ${FAILURES} |
          | **Errors** | ${ERRORS} |
          | **Skipped** | ${SKIPPED} |
          | **API URL** | ${API_URL} |

          > Tests executed against the deployed preview environment.
          EOF
          else
            cat >> "$GITHUB_STEP_SUMMARY" << EOF
          ## Functional Tests

          ⚠️ No results report was generated. Review the previous step logs.

          | **API URL** | ${API_URL} |
          EOF
          fi

      - name: Fail if functional tests fail
        if: steps.check.outputs.functional_count != '0' && env.pytest_exit != '0'
        run: |
          echo "::error::Functional tests failed (exit code: ${pytest_exit})."
          exit "${pytest_exit}"

      - name: Publish notice if no tests are present
        if: steps.check.outputs.functional_count == '0'
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << EOF
          ## Functional Tests

          ℹ️ **No functional tests are present yet.**
          EOF
